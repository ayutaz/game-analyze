<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>D: ダッシュボード — 日本のゲーム99本</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1.5fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .kpi h3 {
      margin: 0 0 12px 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-faint);
      font-weight: 600;
    }
    .donut {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .donut-svg { width: 110px; height: 110px; flex: 0 0 110px; }
    .donut-legend { font-size: 12px; }
    .donut-legend .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 3px 0;
    }
    .donut-legend .row .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .donut-legend .row .n { color: var(--text-dim); font-weight: 600; }

    .bars { display: flex; flex-direction: column; gap: 6px; }
    .bar-row {
      display: grid;
      grid-template-columns: 60px 1fr 32px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .bar-row .label { color: var(--text-dim); }
    .bar-row .bar {
      background: var(--bg);
      border-radius: 4px;
      height: 14px;
      overflow: hidden;
      position: relative;
    }
    .bar-row .bar-fill {
      height: 100%;
      background: var(--exp);
      border-radius: 4px;
    }
    .bar-row .n { color: var(--text-dim); text-align: right; }

    .hist { display: flex; gap: 3px; align-items: flex-end; height: 100px; padding-top: 6px; }
    .hist .col {
      flex: 1;
      background: var(--exp);
      border-radius: 2px 2px 0 0;
      position: relative;
      min-height: 2px;
      opacity: 0.85;
    }
    .hist .col:hover { opacity: 1; }
    .hist-labels {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--text-faint);
    }
    .hist-labels span { flex: 1; text-align: center; }

    .filterbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filterbar .search {
      flex: 1;
      min-width: 220px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      font: inherit;
    }
    .filterbar .chip {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      user-select: none;
      background: var(--surface);
    }
    .filterbar .chip.active.exp { background: var(--exp-bg); border-color: var(--exp); color: var(--exp); }
    .filterbar .chip.active.nar { background: var(--nar-bg); border-color: var(--nar); color: var(--nar); }
    .filterbar .chip.active.rew { background: var(--rew-bg); border-color: var(--rew); color: var(--rew); }
    .filterbar .chip.axis.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
  <header class="topbar" id="topbar"></header>
  <main class="container">
    <div class="kpi-row">
      <div class="kpi">
        <h3>カテゴリ内訳</h3>
        <div class="donut">
          <svg class="donut-svg" id="donut" viewBox="0 0 42 42"></svg>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
      <div class="kpi">
        <h3>体験型の他者軸</h3>
        <div class="bars" id="axis-bars"></div>
      </div>
      <div class="kpi">
        <h3>リリース年代分布</h3>
        <div class="hist" id="hist"></div>
        <div class="hist-labels" id="hist-labels"></div>
      </div>
    </div>

    <div class="filterbar">
      <input type="text" class="search" id="search" placeholder="検索: タイトル / ジャンル…">
      <span class="chip exp" data-key="primary" data-val="EXP">体験型</span>
      <span class="chip nar" data-key="primary" data-val="NAR">物語型</span>
      <span class="chip rew" data-key="primary" data-val="REW">報酬型</span>
      <span style="color:var(--border)">|</span>
      <span class="chip axis" data-key="axis" data-val="対戦">対戦</span>
      <span class="chip axis" data-key="axis" data-val="協力">協力</span>
      <span class="chip axis" data-key="axis" data-val="非対称">非対称</span>
      <span class="chip axis" data-key="axis" data-val="非同期">非同期</span>
      <span class="chip axis" data-key="axis" data-val="ソロ">ソロ</span>
      <span id="count" style="margin-left:auto; color: var(--text-dim); font-size: 12px;"></span>
    </div>

    <div class="grid" id="grid"></div>
  </main>

  <script src="shared.js"></script>
  <script>
    document.getElementById('topbar').innerHTML = topbarNav('dashboard');

    const state = { search:'', primary:new Set(), axis:new Set() };

    function renderDonut(games) {
      const counts = { EXP:0, NAR:0, REW:0 };
      games.forEach(g => counts[g.primary]++);
      const total = counts.EXP + counts.NAR + counts.REW;
      const colors = { EXP:'#2563eb', NAR:'#db2777', REW:'#f59e0b' };
      const svg = document.getElementById('donut');
      let acc = 0;
      let html = '';
      const C = 2 * Math.PI * 15.91549;
      ['EXP','NAR','REW'].forEach(p => {
        const pct = counts[p] / total;
        const len = pct * C;
        const offset = -acc * C;
        html += `<circle cx="21" cy="21" r="15.91549" fill="none" stroke="${colors[p]}" stroke-width="6" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${offset}" transform="rotate(-90 21 21)"/>`;
        acc += pct;
      });
      html += `<text x="21" y="22" text-anchor="middle" font-size="7" fill="#18181b" font-weight="700">${total}</text>`;
      html += `<text x="21" y="28" text-anchor="middle" font-size="3" fill="#71717a">タイトル</text>`;
      svg.innerHTML = html;

      document.getElementById('donut-legend').innerHTML = ['EXP','NAR','REW'].map(p => `
        <div class="row">
          <span><span class="swatch" style="background:${colors[p]}"></span>${PRIMARY_LABEL[p]}</span>
          <span class="n">${counts[p]} (${Math.round(counts[p]/total*100)}%)</span>
        </div>
      `).join('');
    }

    function renderAxisBars(games) {
      const counts = new Map();
      games.filter(g => g.primary === 'EXP').forEach(g => {
        const a = g.social_axis || '未設定';
        counts.set(a, (counts.get(a)||0)+1);
      });
      const max = Math.max(...counts.values(), 1);
      const order = ['対戦','協力','非同期','ソロ','非対称','観戦','未設定'];
      document.getElementById('axis-bars').innerHTML = order.filter(k => counts.has(k)).map(k => `
        <div class="bar-row">
          <span class="label">${k}</span>
          <span class="bar"><span class="bar-fill" style="width:${counts.get(k)/max*100}%"></span></span>
          <span class="n">${counts.get(k)}</span>
        </div>
      `).join('');
    }

    function renderHist(games) {
      const buckets = new Map();
      games.forEach(g => {
        if (!g.year) return;
        const d = Math.floor(g.year / 5) * 5;
        buckets.set(d, (buckets.get(d)||0)+1);
      });
      const sorted = [...buckets.entries()].sort((a,b) => a[0]-b[0]);
      const max = Math.max(...sorted.map(([_,n]) => n), 1);
      document.getElementById('hist').innerHTML = sorted.map(([d,n]) => `
        <div class="col" style="height:${n/max*100}%" title="${d}年代: ${n}本"></div>
      `).join('');
      document.getElementById('hist-labels').innerHTML = sorted.map(([d,_]) => `<span>${String(d).slice(2)}</span>`).join('');
    }

    function applyFilters(games) {
      return games.filter(g => {
        if (state.search) {
          const s = state.search.toLowerCase();
          const hay = [g.title_jp, g.title_en, g.genre].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(s)) return false;
        }
        if (state.primary.size && !state.primary.has(g.primary)) return false;
        if (state.axis.size && !state.axis.has(g.social_axis)) return false;
        return true;
      });
    }

    function render(allGames) {
      const filtered = applyFilters(allGames);
      document.getElementById('count').textContent = `${filtered.length} / ${allGames.length} 件`;
      document.getElementById('grid').innerHTML = filtered.map(cardHTML).join('');
      // KPI はフィルタ適用後で再計算（眺める対象が変わると気付きも変わる）
      renderDonut(filtered.length ? filtered : allGames);
      renderAxisBars(filtered.length ? filtered : allGames);
      renderHist(filtered.length ? filtered : allGames);
    }

    (async () => {
      const idx = await loadIndex();
      const games = idx.games;
      render(games);

      document.querySelectorAll('.filterbar .chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const set = state[chip.dataset.key];
          if (set.has(chip.dataset.val)) {
            set.delete(chip.dataset.val);
            chip.classList.remove('active');
          } else {
            set.add(chip.dataset.val);
            chip.classList.add('active');
          }
          render(games);
        });
      });
      document.getElementById('search').addEventListener('input', e => {
        state.search = e.target.value;
        render(games);
      });
    })();
  </script>
</body>
</html>
